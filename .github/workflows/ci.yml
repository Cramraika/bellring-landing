# Thin caller -> Cramraika/.github reusable Node CI.
# Migrated to the fleet reusable-workflow library (2026-06-26). The reusable
# workflow runs lint + typecheck (if scripts present) + build + test, so this
# Next.js repo's lint/typecheck/build gates are preserved. Trigger is repo-specific.
name: CI

on:
  push:
    branches: [main]
    paths-ignore: ["*.md", "docs/**", ".claude/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  ci:
    uses: Cramraika/.github/.github/workflows/ci-node.yml@8d85e1021b82757cd4083ab8dbc5e75bac703312 # main
    with:
      runner: ${{ vars.RUNNER_TYPE || 'ubuntu-latest' }}
      node-version: "22"
    secrets: inherit
